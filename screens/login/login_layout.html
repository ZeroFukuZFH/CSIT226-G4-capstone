<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tranquility Base | Auth</title>
    <link rel="stylesheet" href="login_style.css">
</head>
<body>

    <main class="container">
    <div class="auth-card">
        <div class="card-content">
            <header class="card-header">
                <p class="subtitle">✦ MEMBER ACCESS</p>
                <h1>Sign In</h1>
            </header>

            <form class="auth-form" method="post" action="login_controller.php">
                <div class="input-group">
                    <label for="email">EMAIL ADDRESS</label>
                    <input name="email" type="email" id="email" placeholder="your@email.com">
                </div>

                <div class="input-group">
                    <label for="password">PASSWORD</label>
                    <input name="password" type="password" id="password" placeholder="••••••••••">
                </div>

                <div class="form-options">
                    <label class="checkbox-container">
                        <input type="checkbox" name="remember">
                        <span class="checkmark"></span>
                        REMEMBER ME
                    </label>
                    <a href="#" class="forgot-link">FORGOT PASSWORD?</a>
                </div>

                <div class="button-group">
                    <button name="submit" type="submit" class="btn-primary">SIGN IN</button>
                    <button name="back" type="button" class="btn-secondary">BACK</button>
                </div>
            </form>

            <footer class="card-footer">
                <a href="#">NO ACCOUNT YET? REGISTER HERE</a>
            </footer>
        </div>
    </div>
</main>

</body>
</html>
