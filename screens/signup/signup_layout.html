<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tranquility Base | Hotel & Casino</title>
    <link rel="stylesheet" href="signup_style.css">
</head>
<body>

    <div class="container">
        <div class="header-sub">New Member</div>
        <h1>Create Account</h1>

        <form>
            <div class="form-row">
                <div class="form-group">
                    <label>First Name</label>
                    <input type="text" placeholder="First name">
                </div>
                <div class="form-group">
                    <label>Last Name</label>
                    <input type="text" placeholder="Last name">
                </div>
            </div>

            <div class="form-group">
                <label>Email Address</label>
                <input type="email" placeholder="your@email.com">
            </div>

            <div class="form-group">
                <label>Password</label>
                <input type="password" placeholder="Create a strong password">
            </div>

            <div class="form-group">
                <label>Confirm Password</label>
                <input type="password" placeholder="Re-enter password">
            </div>

            <div class="membership-box">
                <div class="sub">✦ DEFAULT ACCESS TIER</div>
                <h3>Silver Membership</h3>
                <p>Upgrade anytime from your dashboard</p>
            </div>

            <button type="submit" class="btn-primary">Create Account</button>
            <button type="button" class="btn-secondary">Back</button>
        </form>
    </div>
</body>
</html>
